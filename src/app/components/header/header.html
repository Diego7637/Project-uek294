<header class="header">

  <button
    class="nav-btn"
    routerLink="/">
    Startseite
  </button>

  <div class="right">

    <button
      class="nav-btn"
      routerLink="/categories">
      Kategorien
    </button>

    <button
      class="nav-btn"
      routerLink="/products">
      Produkte
    </button>

    @if (isAdmin) {

      <div class="dropdown">

        <button class="nav-btn">
          Admin ▾
        </button>

        <div class="dropdown-content">

          <a routerLink="/admin/products">
            Produkt Bearbeitung
          </a>

          <a routerLink="/admin/users">
            User Berechtigen
          </a>

        </div>

      </div>

    }

    <div class="dropdown">

      <button class="nav-btn">
        Anmelden ▾
      </button>

      <div class="dropdown-content">

        <a routerLink="/login">
          Einloggen
        </a>

        <a routerLink="/register">
          Registrieren
        </a>

      </div>

    </div>

  </div>

</header>
