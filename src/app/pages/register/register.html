<main class="auth-page">
  <section class="auth-card">
    <div class="auth-header">
      <h1>Registrieren</h1>
    </div>

    <form [formGroup]="form" class="auth-form">
      <div class="form-grid">
        <div class="form-field">
          <label for="firstName">Vorname</label>
          <input id="firstName" type="text" formControlName="firstName" autocomplete="given-name">
        </div>

        <div class="form-field">
          <label for="lastName">Nachname</label>
          <input id="lastName" type="text" formControlName="lastName" autocomplete="family-name">
        </div>

        <div class="form-field full-width">
          <label for="street">Strasse</label>
          <input id="street" type="text" formControlName="street" autocomplete="street-address">
        </div>

        <div class="form-field short-field">
          <label for="zip">PLZ</label>
          <input id="zip" type="text" formControlName="zip" autocomplete="postal-code">
        </div>

        <div class="form-field">
          <label for="city">Stadt</label>
          <input id="city" type="text" formControlName="city" autocomplete="address-level2">
        </div>

        <div class="form-field">
          <label for="country">Land</label>
          <input id="country" type="text" formControlName="country" autocomplete="country-name">
        </div>

        <div class="form-field">
          <label for="phone">Telefon</label>
          <input id="phone" type="tel" formControlName="phone" autocomplete="tel">
        </div>

        <div class="form-field">
          <label for="mobilePhone">Mobile</label>
          <input id="mobilePhone" type="tel" formControlName="mobilePhone" autocomplete="tel">
        </div>

        <div class="form-field full-width">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" autocomplete="email">
        </div>

        <div class="form-field">
          <label for="password">Passwort</label>
          <input id="password" type="password" formControlName="password" autocomplete="new-password">
        </div>

        <div class="form-field">
          <label for="confirmPassword">Passwort bestätigen</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password">
        </div>
      </div>

      <button type="button" class="primary-btn" (click)="submit()">
        Registrieren
      </button>
    </form>

    <p class="auth-switch">
      Bereits ein Konto?
      <a routerLink="/login">Einloggen</a>
    </p>
  </section>
</main>
