<div class="product-grid">
  <div
    class="product-card"
    *ngFor="let p of products()"
    [routerLink]="['/products', p.id]"
  >

    <img
      class="product-image"
      [src]="p.image"
      [alt]="p.name">

    <h2 class="name">{{ p.name }}</h2>
    <p class="sku">SKU: {{ p.sku }}</p>
    <p class="price">{{ p.price }} CHF</p>
    <p class="stock">Lager: {{ p.stock }}</p>
  </div>
</div>
